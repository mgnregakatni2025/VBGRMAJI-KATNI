<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- यह लाइन आपकी वेबसाइट को हर 5 मिनट में अपने आप रिफ्रेश करेगी ताकि एक्सेल का नया डेटा दिखता रहे -->
    <meta http-equiv="refresh" content="300">
    <title>VB-GRAM G LIVE REPORT</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #ffffff; 
            font-family: Arial, sans-serif;
        }
        .wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: top;
            padding-top: 10px;
        }
        /* एक्सेल फ्रेम को फुल स्क्रीन, स्थिर और रिस्पॉन्सिव बनाना */
        iframe {
            width: 98% !important;
            height: 95vh !important;
            border: 2px solid #cbd5e1 !important;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden !important;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- सुधरा हुआ एक्सेल एम्बेड कोड (wdHideSheetTabs=1 के साथ) -->
        <iframe frameborder="0" scrolling="no" src="https://1drv.ms"></iframe>
    </div>

</body>
</html>
