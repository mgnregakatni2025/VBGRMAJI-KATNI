<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VB-GRAM G LIVE DASHBOARD</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f1f5f9; margin: 0; padding: 15px; color: #334155; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { border: 1px solid #cbd5e1; padding: 12px 10px; text-align: center; white-space: nowrap; }
        
        /* आपकी इमेज जैसी असली कलर कोडिंग */
        .row-header-1 { background-color: #000000 !important; color: #ffffff !important; font-size: 16px; font-weight: bold; }
        .row-header-2 { background-color: #ffffff !important; color: #0f172a !important; font-weight: bold; font-size: 14px; }
        .row-header-3 { background-color: #ffffff !important; color: #64748b !important; font-weight: bold; font-size: 13px; }
        .row-block-title { background-color: #f8fafc !important; font-weight: bold; color: #1e293b; }
        .row-total { background-color: #cfe2f3 !important; font-weight: bold; color: #0f172a; }
        .row-dysfunctional { background-color: #9fc5e8 !important; font-weight: bold; color: #0f172a; }
    </style>
</head>
<body>

<div class="container">
    <div id="loading" style="text-align:center; font-weight:bold; padding:20px;">डेटाबेस से लाइव रिपोर्ट तैयार की जा रही है...</div>
    <table id="dbTable" style="display:none;"></table>
</div>

<script>
    // बिना पुराना कैश लोड किए हर बार नया डेटा खींचना
    fetch('data.json?t=' + new Date().getTime())
    .then(response => response.json())
    .then(data => {
        document.getElementById('loading').style.display = 'none';
        const table = document.getElementById('dbTable');
        table.style.display = 'table';
        
        data.forEach((row, index) => {
            const tr = document.createElement('tr');
            
            // रो इंडेक्स के आधार पर ऑटो-डिज़ाइनिंग
            if (index === 0) tr.className = 'row-header-1';
            else if (index === 1) tr.className = 'row-header-2';
            else if (index === 2) tr.className = 'row-header-3';
            else if (index >= 3 && index <= 5) tr.className = 'row-block-title';
            
            const firstCellText = row[0] ? row[0].toString().toUpperCase() : '';
            if (firstCellText.includes('TOTAL')) tr.className = 'row-total';
            if (firstCellText.includes('DYSFUNCTIONAL')) tr.className = 'row-dysfunctional';
            
            row.forEach(cellText => {
                const cell = document.createElement(index === 0 ? 'th' : 'td');
                // अगर डेटा में '0' है तो उसकी जगह सुंदर डैश (-) दिखाना
                cell.innerText = cellText === "0" ? "-" : cellText;
                tr.appendChild(cell);
            });
            table.appendChild(tr);
        });
    })
    .catch(err => {
        document.getElementById('loading').innerText = 'डेटा लोड करने में त्रुटि आई। कृपया एक्सेल से डेटा अपलोड करें।';
    });
</script>
</body>
</html>
