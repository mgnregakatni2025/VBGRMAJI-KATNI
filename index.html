<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="300">
    <title>VB-GRAM G LIVE REPORT</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #ffffff; 
        }
        .wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: top;
            padding-top: 10px;
        }
        iframe {
            width: 98% !important;
            height: 95vh !important;
            border: 2px solid #cbd5e1 !important;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            overflow: hidden !important;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- मैंने यहाँ सही लिंक के अंदर कमाण्‍ड मर्ज कर दी है -->
        <iframe frameborder="0" scrolling="no" src="https://live.com"></iframe>
    </div>

</body>
</html>
